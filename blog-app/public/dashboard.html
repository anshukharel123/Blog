<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Blog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
<img src="logo.png" style="height:35px; width:auto; object-fit:contain;" />
    <div>
      <a href="index.html">Home</a>
      <span id="usernameDisplay" style="color:white; margin-left:20px;"></span>
      <span id="roleBadge" class="badge" style="display:none;"></span>
      <a href="#" onclick="logout()" style="margin-left:20px;">Logout</a>
    </div>
  </nav>

  <div class="container">

    <!-- Create Post Section -->
    <div class="card">
      <h2>Create New Post</h2>
      <br>
      <div class="message" id="postMessage"></div>
      <form id="postForm">
        <input type="text" id="title" placeholder="Post title" required />
        <textarea id="content" placeholder="Write your post here..."></textarea>
        <button class="btn btn-primary" type="submit">Publish Post</button>
      </form>
    </div>

    <!-- My Posts Section -->
    <div class="page-header">
      <h2 id="postsHeading">My Posts</h2>
    </div>

    <div id="postsContainer"></div>

    <!-- Admin Section -->
    <div id="adminSection" style="display:none;">
      <div class="page-header">
        <h2>All Users <span class="badge admin">Admin</span></h2>
      </div>
      <div id="usersContainer"></div>
    </div>

  </div>

  <script>
    const token = localStorage.getItem('token');

    // If not logged in, redirect to login
    if (!token) {
      window.location.href = 'login.html';
    }

    // Decode token to get user info
    function parseJwt(token) {
      const base64 = token.split('.')[1];
      const decoded = JSON.parse(atob(base64));
      return decoded;
    }

    const user = parseJwt(token);
    const isAdmin = user.role === 'admin';

    // Show username and role
    document.getElementById('usernameDisplay').textContent = `Hi, ${user.username}!`;
    const badge = document.getElementById('roleBadge');
    badge.style.display = 'inline-block';
    badge.textContent = user.role;
    if (isAdmin) badge.classList.add('admin');

    // Show admin section if admin
    if (isAdmin) {
      document.getElementById('adminSection').style.display = 'block';
      document.getElementById('postsHeading').textContent = 'All Posts';
      loadUsers();
    }

    // Load posts
    async function loadPosts() {
      const res = await fetch('/api/posts');
      const posts = await res.json();

      const container = document.getElementById('postsContainer');
      container.innerHTML = '';

      if (posts.length === 0) {
        container.innerHTML = '<p style="color:#999;">No posts yet. Create your first one!</p>';
        return;
      }

      posts.forEach(post => {
        const isOwner = post.user_id === user.id;
        const canDelete = isOwner || isAdmin;

        container.innerHTML += `
          <div class="card">
            <h2>${post.title}</h2>
            <p>${post.content}</p>
            <div class="meta">By ${post.username} • ${new Date(post.created_at).toLocaleDateString()}</div>
            <div style="margin-top:15px;">
              ${isOwner ? `<button class="btn btn-primary" onclick="editPost(${post.id}, '${post.title}', '${post.content}')">Edit</button>` : ''}
              ${canDelete ? `<button class="btn btn-danger" style="margin-left:10px;" onclick="deletePost(${post.id})">Delete</button>` : ''}
            </div>
          </div>
        `;
      });
    }

    // Load users (admin only)
    async function loadUsers() {
      const res = await fetch('/api/admin/users', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const users = await res.json();

      const container = document.getElementById('usersContainer');
      container.innerHTML = '';

      users.forEach(u => {
        container.innerHTML += `
          <div class="card">
            <h2>${u.username} <span class="badge ${u.role === 'admin' ? 'admin' : ''}">${u.role}</span></h2>
            <p style="color:#666;">${u.email}</p>
            <div class="meta">Joined ${new Date(u.created_at).toLocaleDateString()}</div>
          </div>
        `;
      });
    }

    // Create post
    document.getElementById('postForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const title = document.getElementById('title').value;
      const content = document.getElementById('content').value;
      const message = document.getElementById('postMessage');

      const res = await fetch('/api/posts', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ title, content })
      });

      const data = await res.json();

      if (res.ok) {
        message.className = 'message success';
        message.style.display = 'block';
        message.textContent = 'Post published!';
        document.getElementById('postForm').reset();
        loadPosts();
        setTimeout(() => message.style.display = 'none', 2000);
      } else {
        message.className = 'message error';
        message.style.display = 'block';
        message.textContent = data.message || 'Failed to create post';
      }
    });

    // Delete post
    async function deletePost(id) {
      if (!confirm('Are you sure you want to delete this post?')) return;

      const res = await fetch(`/api/posts/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (res.ok) {
        loadPosts();
      }
    }

    // Edit post
    function editPost(id, title, content) {
      document.getElementById('title').value = title;
      document.getElementById('content').value = content;
      document.getElementById('postForm').onsubmit = async (e) => {
        e.preventDefault();
        const newTitle = document.getElementById('title').value;
        const newContent = document.getElementById('content').value;

        const res = await fetch(`/api/posts/${id}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ title: newTitle, content: newContent })
        });

        if (res.ok) {
          document.getElementById('postForm').reset();
          loadPosts();
        }
      };
    }

    // Logout
    function logout() {
      localStorage.removeItem('token');
      window.location.href = 'login.html';
    }

    // Load posts on page load
    loadPosts();
  </script>

</body>
</html>
